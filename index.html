<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求人情報｜morich</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f5f5;color:#333;line-height:1.8;font-size:14px;}

/* ── ヘッダー ── */
.header{background:#fff;border-bottom:2px solid #C8253A;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;}
@media(max-width:600px){.header{padding:14px 18px;}}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:34px;height:34px;background:#C8253A;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;}
.logo-name{font-size:20px;font-weight:700;color:#C8253A;letter-spacing:3px;}
.header-sub{font-size:11px;color:#aaa;letter-spacing:1px;}

/* ── ヒーロー ── */
.hero{background:#fff;border-bottom:1px solid #eee;padding:40px 32px 36px;text-align:center;}
@media(max-width:600px){.hero{padding:28px 18px;}}
.hero-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;}
.hero-logo-mark{width:48px;height:48px;background:#C8253A;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;}
.hero-logo-name{font-size:28px;font-weight:700;color:#C8253A;letter-spacing:4px;}
.hero-tagline{font-size:13px;color:#888;letter-spacing:0.5px;margin-bottom:28px;}
.hero-stats{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;}
.hero-stat{text-align:center;}
.hero-stat-num{font-size:24px;font-weight:700;color:#C8253A;}
.hero-stat-num span{font-size:13px;font-weight:400;margin-left:1px;}
.hero-stat-label{font-size:10px;color:#aaa;letter-spacing:1px;margin-top:2px;}

/* ── 検索 ── */
.search-bar{background:#fff;border-bottom:1px solid #eee;padding:16px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:5;}
@media(max-width:600px){.search-bar{padding:12px 16px;}}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:#333;outline:none;transition:border-color .2s;background:#fafafa;}
.search-wrap input:focus{border-color:#C8253A;background:#fff;}
.search-wrap input::placeholder{color:#bbb;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#bbb;}
.result-count{font-size:12px;color:#aaa;white-space:nowrap;}
.result-count strong{color:#C8253A;}

/* ── フィルター ── */
.filter-bar{background:#fff;border-bottom:1px solid #eee;padding:10px 32px;display:flex;flex-wrap:wrap;gap:6px;}
@media(max-width:600px){.filter-bar{padding:10px 16px;}}
.ftag{font-size:11.5px;padding:4px 12px;border-radius:2px;border:1px solid #ddd;color:#666;cursor:pointer;background:#fff;transition:all .15s;user-select:none;}
.ftag:hover,.ftag.active{background:#C8253A;color:#fff;border-color:#C8253A;}

/* ── リスト ── */
.list-wrap{max-width:760px;margin:24px auto;padding:0 24px 60px;}
@media(max-width:600px){.list-wrap{padding:0 0 48px;}}

/* ── 求人カード ── */
.job-item{background:#fff;border-bottom:1px solid #eee;padding:20px 24px;cursor:pointer;text-decoration:none;color:inherit;display:block;transition:background .15s;}
.job-item:first-child{border-top:1px solid #eee;}
.job-item:hover{background:#fdf2f3;}
.ji-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
.ji-company{font-size:12px;color:#aaa;margin-bottom:3px;}
.ji-position{font-size:15px;font-weight:500;color:#333;line-height:1.5;}
.ji-salary{font-size:13px;font-weight:700;color:#C8253A;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.ji-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.ji-tag{font-size:10.5px;padding:2px 8px;border-radius:2px;background:#f5f5f5;border:1px solid #e0e0e0;color:#666;}
.ji-tag.red{background:#fdf2f3;border-color:#e8c0c6;color:#C8253A;}
.ji-recommend{font-size:12px;color:#888;line-height:1.65;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.ji-location{font-size:11px;color:#bbb;margin-top:6px;display:flex;align-items:center;gap:4px;}

/* ── 空・ロード ── */
.empty{text-align:center;padding:60px 24px;color:#bbb;font-size:13px;}
.loading-block{text-align:center;padding:60px 24px;color:#bbb;font-size:13px;}
.spinner{width:24px;height:24px;border:2px solid #e8c0c6;border-top-color:#C8253A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── ページネーション ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:28px;flex-wrap:wrap;}
.pbtn{min-width:34px;height:34px;padding:0 8px;display:flex;align-items:center;justify-content:center;border:1px solid #ddd;font-size:12.5px;cursor:pointer;background:#fff;color:#666;transition:all .15s;font-family:'Noto Sans JP',sans-serif;border-radius:2px;}
.pbtn:hover{border-color:#C8253A;color:#C8253A;}
.pbtn.active{background:#C8253A;color:#fff;border-color:#C8253A;}
.pbtn:disabled{opacity:.3;cursor:default;pointer-events:none;}
.page-info{font-size:11px;color:#bbb;padding:0 8px;}

/* ── フッター ── */
.footer{text-align:center;padding:28px;font-size:11px;color:#bbb;}
.footer-logo{font-size:13px;font-weight:700;color:#C8253A;letter-spacing:3px;margin-bottom:4px;}
</style>
</head>
<body>

<div class="header">
  <a class="logo" href="index.html">
    <div class="logo-mark">m</div>
    <div class="logo-name">morich</div>
  </a>
  <div class="header-sub">JOBS</div>
</div>

<div class="hero">
  <div class="hero-logo">
    <div class="hero-logo-mark">m</div>
    <div class="hero-logo-name">morich</div>
  </div>
  <div class="hero-tagline">厳選された求人を、プロのコンサルタントがご紹介します。</div>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-num" id="stat-count">—</div>
      <div class="hero-stat-label">公開求人数</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num">98<span>%</span></div>
      <div class="hero-stat-label">定着率</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num">15<span>年</span></div>
      <div class="hero-stat-label">支援実績</div>
    </div>
  </div>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="会社名・ポジション・キーワードで絞り込み">
  </div>
  <div class="result-count" id="result-count"></div>
</div>

<div class="filter-bar" id="filter-bar">
  <div class="ftag active" data-filter="all">すべて</div>
  <div class="ftag" data-filter="IT・通信・インターネット">IT・通信</div>
  <div class="ftag" data-filter="サービス・レジャー">サービス</div>
  <div class="ftag" data-filter="金融・保険">金融・保険</div>
  <div class="ftag" data-filter="メーカー">メーカー</div>
  <div class="ftag" data-filter="コンサルティング">コンサル</div>
  <div class="ftag" data-filter="不動産・建設・設備">不動産</div>
  <div class="ftag" data-filter="流通・小売">流通・小売</div>
  <div class="ftag" data-filter="マスコミ・広告・デザイン">マスコミ</div>
</div>

<div class="list-wrap">
  <div id="jobs-container">
    <div class="loading-block">
      <div class="spinner"></div>
      読み込んでいます...
    </div>
  </div>
  <div id="pagination" class="pagination"></div>
</div>

<div class="footer">
  <div class="footer-logo">morich</div>
  © 2025 morich Inc.
</div>

<script>
const PER_PAGE = 30;
let allJobs = [], filtered = [], currentPage = 1;
let activeFilter = 'all', searchQuery = '';

function remoteBadge(r){
  if(!r) return '';
  if(r.includes('フルリモート')) return '<span class="ji-tag red">🏠 フルリモート</span>';
  if(r.includes('ハイブリッド'))  return '<span class="ji-tag">🔀 ハイブリッド</span>';
  return '';
}

function renderItem(j){
  const rb = remoteBadge(j.remote);
  const sj = j.sideJob && j.sideJob.includes('可') ? '<span class="ji-tag">副業可</span>' : '';
  const li = j.stock && j.stock !== '非上場' ? `<span class="ji-tag">${esc(j.stock)}</span>` : '';
  const rec = (j.recommend||'').replace(/\n/g,' ').trim();
  return `<a class="job-item" href="detail.html?id=${encodeURIComponent(j.id)}">
  <div class="ji-top">
    <div>
      <div class="ji-company">${esc(j.company)}</div>
      <div class="ji-position">${esc(j.position||'ポジション調整中')}</div>
    </div>
    ${j.salary ? `<div class="ji-salary">${esc(j.salary)}</div>` : ''}
  </div>
  <div class="ji-tags">
    ${j.industry ? `<span class="ji-tag">${esc(j.industry)}</span>` : ''}
    ${rb}${sj}${li}
  </div>
  ${rec ? `<div class="ji-recommend">${esc(rec)}</div>` : ''}
  ${j.location ? `<div class="ji-location"><svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>${esc(j.location)}</div>` : ''}
</a>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function applyFilter(){
  const q = searchQuery.toLowerCase();
  filtered = allJobs.filter(j=>{
    const mf = activeFilter === 'all' || j.industry === activeFilter;
    const ms = !q || [j.company,j.position,j.industry,j.recommend,j.requirements]
                     .some(f=>(f||'').toLowerCase().includes(q));
    return mf && ms;
  });
  currentPage = 1;
  renderPage();
}

function renderPage(){
  const total = filtered.length;
  const totalPages = Math.ceil(total / PER_PAGE);
  const slice = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  document.getElementById('result-count').innerHTML = `<strong>${total}</strong> 件`;

  if(total === 0){
    document.getElementById('jobs-container').innerHTML =
      '<div class="empty">条件に合う求人が見つかりませんでした。</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  document.getElementById('jobs-container').innerHTML = slice.map(renderItem).join('');
  renderPagination(totalPages);
}

function renderPagination(total){
  if(total<=1){ document.getElementById('pagination').innerHTML=''; return; }
  const p = currentPage;
  const pages = new Set([1,total,p-1,p,p+1].filter(n=>n>=1&&n<=total));
  let html = `<button class="pbtn" onclick="goPage(${p-1})" ${p===1?'disabled':''}>‹</button>`;
  let prev=0;
  for(const n of [...pages].sort((a,b)=>a-b)){
    if(prev && n-prev>1) html += `<span class="page-info">…</span>`;
    html += `<button class="pbtn ${n===p?'active':''}" onclick="goPage(${n})">${n}</button>`;
    prev=n;
  }
  html += `<button class="pbtn" onclick="goPage(${p+1})" ${p===total?'disabled':''}>›</button>`;
  html += `<span class="page-info">${p} / ${total}</span>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(n){ currentPage=n; renderPage(); window.scrollTo({top:0,behavior:'smooth'}); }

document.getElementById('filter-bar').addEventListener('click', e=>{
  const t = e.target.closest('.ftag');
  if(!t) return;
  document.querySelectorAll('.ftag').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  activeFilter = t.dataset.filter;
  applyFilter();
});

let timer;
document.getElementById('search-input').addEventListener('input', e=>{
  clearTimeout(timer);
  timer = setTimeout(()=>{ searchQuery = e.target.value.trim(); applyFilter(); }, 250);
});

fetch('jobs.json')
  .then(r=>r.json())
  .then(data=>{
    allJobs = data;
    document.getElementById('stat-count').innerHTML = `${data.length}<span>件</span>`;
    applyFilter();
  })
  .catch(()=>{
    document.getElementById('jobs-container').innerHTML =
      '<div class="empty">データの読み込みに失敗しました。</div>';
  });
</script>
</body>
</html>
