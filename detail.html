<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求人情報｜morich</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C8253A;--red-light:#f7e8ea;--red-mid:#e8c0c6;--red-dark:#8f1528;
  --rose:#fdf2f3;--warm:#fffaf9;
  --text:#2a1a1c;--text-mid:#7a5058;--text-light:#b08890;
  --border:rgba(200,37,58,0.12);--bsoft:rgba(200,37,58,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f5f5;color:var(--text);line-height:1.8;font-size:14px;}

/* ヘッダー */
.header{background:#fff;border-bottom:2px solid var(--red);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
@media(max-width:600px){.header{padding:12px 16px;}}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:32px;height:32px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Noto Serif JP',serif;font-size:12px;}
.logo-name{font-family:'Noto Serif JP',serif;font-size:18px;color:var(--red);letter-spacing:3px;}
.back-link{font-size:12px;color:var(--text-light);text-decoration:none;display:flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;transition:all .15s;}
.back-link:hover{color:var(--red);border-color:var(--red-mid);}

/* コンテナ */
.container{max-width:740px;margin:28px auto 60px;background:#fff;box-shadow:0 1px 12px rgba(0,0,0,0.06);}
@media(max-width:760px){.container{margin:0;box-shadow:none;}}

/* 求人ヘッダー */
.job-header{padding:32px 36px 28px;border-bottom:1px solid var(--border);}
@media(max-width:600px){.job-header{padding:24px 20px 20px;}}
.job-id{font-size:10px;color:var(--text-light);letter-spacing:1.5px;margin-bottom:8px;}
.job-company{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;}
.job-position{font-size:16px;font-weight:500;color:var(--red);margin-bottom:16px;line-height:1.5;}
.job-tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{font-size:11px;padding:3px 10px;border-radius:3px;}
.tag.gray{background:#f5f5f5;border:1px solid #e0e0e0;color:#666;}
.tag.red{background:var(--rose);border:1px solid var(--red-mid);color:var(--red);}
.tag.green{background:#e8f5ee;border:1px solid #a8d4b8;color:#2a7a4a;}
.tag.blue{background:#e8f0f8;border:1px solid #b3d0f0;color:#1a5a9a;}
.tag.yellow{background:#fff8e1;border:1px solid #ffe082;color:#7a5a00;}

/* セクション共通 */
.section{padding:28px 36px;border-bottom:1px solid #f0f0f0;}
@media(max-width:600px){.section{padding:22px 20px;}}
.section:last-child{border-bottom:none;}
.sec-title{font-size:10.5px;font-weight:700;letter-spacing:2px;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--red-mid);opacity:.5;}

/* テキストブロック */
.text-block{font-size:13.5px;line-height:1.9;color:#444;}
.text-block br{display:block;content:'';margin-bottom:2px;}

/* 募集要項テーブル */
.req-table{width:100%;border-collapse:collapse;}
.req-table tr{border-bottom:1px solid #f5f5f5;}
.req-table tr:last-child{border-bottom:none;}
.req-table th{width:120px;padding:10px 0;font-size:12px;font-weight:500;color:var(--text-light);vertical-align:top;white-space:nowrap;}
.req-table td{padding:10px 0 10px 16px;font-size:13.5px;color:var(--text);line-height:1.8;}

/* morichオススメ */
.recommend-section{background:var(--rose);padding:28px 36px;border-bottom:1px solid var(--red-mid);}
@media(max-width:600px){.recommend-section{padding:22px 20px;}}
.recommend-lines{display:flex;flex-direction:column;gap:9px;}
.recommend-line{font-size:13.5px;color:var(--text);line-height:1.75;display:flex;gap:10px;align-items:flex-start;}
.recommend-line::before{content:'▶';color:var(--red);font-size:10px;margin-top:5px;flex-shrink:0;}

/* 応募資格リスト */
.req-list{display:flex;flex-direction:column;gap:7px;}
.req-item{font-size:13.5px;color:var(--text);line-height:1.8;padding-left:14px;position:relative;}
.req-item::before{content:'';position:absolute;left:0;top:10px;width:5px;height:5px;border-radius:50%;background:var(--red-mid);}

/* 企業情報チップ */
.company-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.company-chip{background:#f9f9f9;border:1px solid #e8e8e8;border-radius:4px;padding:6px 12px;}
.chip-label{font-size:10px;color:#aaa;margin-bottom:2px;}
.chip-value{font-size:12.5px;font-weight:500;color:var(--text);}

/* ローディング */
.loading{text-align:center;padding:80px 24px;color:var(--text-light);}
.spinner{width:28px;height:28px;border:2px solid var(--red-mid);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* フッター */
.footer{text-align:center;padding:24px;font-size:11px;color:var(--text-light);background:#f5f5f5;}
.footer-logo-name{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--red);letter-spacing:3px;margin-bottom:4px;}
</style>
</head>
<body>

<div class="header">
  <a class="logo" href="index.html">
    <div class="logo-mark">m</div>
    <div class="logo-name">morich</div>
  </a>
  <a class="back-link" href="index.html">
    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    求人一覧
  </a>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div>読み込んでいます...</div>
</div>

<div class="footer">
  <div class="footer-logo-name">morich</div>
  © 2025 morich Inc.
</div>

<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 改行を<br>に変換
function nl(s){ return esc(s).replace(/\n/g,'<br>'); }

// テキストブロック（改行対応）
function textBlock(s){
  return s ? `<div class="text-block">${nl(s)}</div>` : '';
}

// 箇条書き（行ごと）
function lineList(s){
  if(!s) return '';
  const lines = s.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return '';
  return `<div class="req-list">${lines.map(l=>`<div class="req-item">${esc(l)}</div>`).join('')}</div>`;
}

// セクション
function section(icon, title, bodyHtml){
  if(!bodyHtml) return '';
  return `<div class="section">
    <div class="sec-title">${icon} ${title}</div>
    ${bodyHtml}
  </div>`;
}

function render(j){
  document.title = `${j.position}｜${j.company}｜morich`;

  // タグ
  const tags = [
    j.employment  ? `<span class="tag gray">${esc(j.employment)}</span>` : '',
    j.industry    ? `<span class="tag gray">${esc(j.industry)}</span>` : '',
    j.stock && j.stock!=='非上場' ? `<span class="tag red">${esc(j.stock)}${j.ipo?' / '+esc(j.ipo):''}</span>` : '',
    j.remote && j.remote.includes('フルリモート') ? `<span class="tag green">🏠 フルリモート</span>` : '',
    j.remote && j.remote.includes('ハイブリッド')  ? `<span class="tag blue">🔀 ハイブリッド</span>` : '',
    j.sideJob && j.sideJob.includes('可') ? `<span class="tag yellow">副業可</span>` : '',
  ].filter(Boolean).join('');

  // 企業情報チップ
  const chips = [
    j.hq        ? `<div class="company-chip"><div class="chip-label">本社</div><div class="chip-value">${esc(j.hq)}</div></div>` : '',
    j.founded   ? `<div class="company-chip"><div class="chip-label">設立</div><div class="chip-value">${esc(j.founded)}</div></div>` : '',
    j.employees ? `<div class="company-chip"><div class="chip-label">従業員数</div><div class="chip-value">${esc(j.employees)}</div></div>` : '',
    j.capital   ? `<div class="company-chip"><div class="chip-label">資本金</div><div class="chip-value">${esc(j.capital)}</div></div>` : '',
  ].filter(Boolean).join('');

  // 募集要項テーブル
  const reqRows = [
    ['ポジション', j.position],
    ['雇用形態',   j.employment],
    ['勤務地',     j.location],
    ['勤務時間',   j.workHours],
    ['休日休暇',   j.holiday],
    ['リモート',   j.remote],
    ['副業',       j.sideJob],
    ['喫煙',       j.smoking],
  ].filter(([,v])=>v&&v.trim());

  const salaryRow = j.salaryDetail
    ? `<tr><th>給与</th><td>${nl(j.salaryDetail)}</td></tr>` : '';

  const welfareRow = j.welfare
    ? `<tr><th>待遇・福利厚生</th><td>${nl(j.welfare)}</td></tr>` : '';

  const reqTable = (reqRows.length || salaryRow || welfareRow) ? `
    <table class="req-table">
      ${reqRows.map(([k,v])=>`<tr><th>${esc(k)}</th><td>${nl(v)}</td></tr>`).join('')}
      ${salaryRow}
      ${welfareRow}
    </table>` : '';

  // morichオススメPOINT
  const recLines = j.recommend
    ? j.recommend.split('\n').map(l=>l.trim()).filter(Boolean) : [];
  const recommendHtml = recLines.length ? `
    <div class="recommend-section">
      <div class="sec-title">🔥 morichオススメPOINT</div>
      <div class="recommend-lines">
        ${recLines.map(l=>`<div class="recommend-line">${esc(l)}</div>`).join('')}
      </div>
    </div>` : '';

  // 応募資格（詳細 優先、なければ概要）
  const reqBody = j.reqDetail
    ? lineList(j.reqDetail)
    : (j.reqSummary ? lineList(j.reqSummary) : '');

  document.getElementById('content').innerHTML = `
    <div class="container">

      <div class="job-header">
        <div class="job-id">JOB ID: ${esc(j.id)}</div>
        <div class="job-company">${esc(j.company)}</div>
        <div class="job-position">${esc(j.position||'ポジション調整中')}</div>
        <div class="job-tags">${tags}</div>
      </div>

      ${recommendHtml}

      ${chips || j.companyDesc ? `
      <div class="section">
        <div class="sec-title">🏢 企業情報</div>
        ${chips ? `<div class="company-chips">${chips}</div>` : ''}
        ${textBlock(j.companyDesc)}
      </div>` : ''}

      ${j.desc ? `
      <div class="section">
        <div class="sec-title">📋 業務内容</div>
        ${textBlock(j.desc)}
      </div>` : ''}

      ${reqTable ? `
      <div class="section">
        <div class="sec-title">📌 募集要項</div>
        ${reqTable}
      </div>` : ''}

      ${reqBody ? `
      <div class="section">
        <div class="sec-title">✅ 応募資格</div>
        ${reqBody}
      </div>` : ''}

      ${j.persona ? `
      <div class="section">
        <div class="sec-title">🎯 求める人材像</div>
        ${textBlock(j.persona)}
      </div>` : ''}

      ${j.background || j.backgroundDetail ? `
      <div class="section">
        <div class="sec-title">📣 募集背景</div>
        ${textBlock(j.backgroundDetail || j.background)}
      </div>` : ''}

      ${j.selection ? `
      <div class="section">
        <div class="sec-title">🔍 選考ポイント</div>
        ${textBlock(j.selection)}
      </div>` : ''}

      ${j.comment ? `
      <div class="section">
        <div class="sec-title">💬 morichコメント</div>
        ${textBlock(j.comment)}
      </div>` : ''}

    </div>`;
}

const id = new URLSearchParams(location.search).get('id');
if(!id){
  document.getElementById('content').innerHTML=
    '<div class="loading"><p>求人IDが指定されていません。<a href="index.html">一覧へ戻る</a></p></div>';
} else {
  fetch('jobs.json')
    .then(r=>r.json())
    .then(jobs=>{
      const job = jobs.find(j=>j.id===id);
      job ? render(job)
          : document.getElementById('content').innerHTML=
              '<div class="loading"><p>求人が見つかりませんでした。<a href="index.html" style="color:var(--red)">一覧へ戻る</a></p></div>';
    })
    .catch(()=>{
      document.getElementById('content').innerHTML=
        '<div class="loading"><p>データの読み込みに失敗しました。</p></div>';
    });
}
</script>
</body>
</html>
