<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求人情報｜morich</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f5f5;color:#333;line-height:1.8;font-size:14px;}

/* ── ヘッダー ── */
.header{background:#fff;border-bottom:2px solid #C8253A;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:34px;height:34px;background:#C8253A;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;letter-spacing:-0.5px;}
.logo-name{font-size:20px;font-weight:700;color:#C8253A;letter-spacing:3px;}
.back-link{font-size:12px;color:#999;text-decoration:none;display:flex;align-items:center;gap:4px;}
.back-link:hover{color:#C8253A;}

/* ── コンテナ ── */
.container{max-width:720px;margin:32px auto;background:#fff;padding:40px 48px 60px;}
@media(max-width:700px){.container{margin:0;padding:28px 24px 48px;}}

/* ── 求人ヘッド ── */
.job-id{font-size:11px;color:#999;letter-spacing:1px;margin-bottom:10px;}
.job-company{font-size:22px;font-weight:700;color:#333;margin-bottom:6px;}
.job-position{font-size:17px;font-weight:500;color:#C8253A;margin-bottom:20px;line-height:1.5;}
.job-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
.meta-tag{font-size:11.5px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:4px;padding:3px 10px;color:#666;}
.meta-tag.red{background:#fdf2f3;border-color:#e8c0c6;color:#C8253A;}

hr{border:none;border-top:1px solid #eee;margin:28px 0;}

/* ── セクション ── */
.sec-label{font-size:11px;font-weight:700;letter-spacing:2px;color:#C8253A;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.sec-body{font-size:13.5px;line-height:1.9;color:#444;white-space:pre-wrap;}
.sec-body p{margin-bottom:8px;}
.sec-body p:last-child{margin-bottom:0;}

/* ── morichオススメ ── */
.recommend-block{background:#fdf2f3;border-left:3px solid #C8253A;padding:18px 20px;}
.recommend-block .sec-label{margin-bottom:10px;}
.recommend-lines{display:flex;flex-direction:column;gap:7px;}
.recommend-line{font-size:13.5px;color:#333;line-height:1.75;display:flex;gap:8px;}
.recommend-line::before{content:'▶';color:#C8253A;font-size:10px;margin-top:5px;flex-shrink:0;}

/* ── 募集要項テーブル ── */
.req-table{width:100%;border-collapse:collapse;}
.req-table tr{border-bottom:1px solid #f0f0f0;}
.req-table th{width:110px;padding:10px 0;font-size:12px;font-weight:500;color:#999;vertical-align:top;white-space:nowrap;}
.req-table td{padding:10px 0 10px 16px;font-size:13.5px;color:#333;line-height:1.75;}

/* ── 応募資格 ── */
.req-list{display:flex;flex-direction:column;gap:7px;}
.req-item{font-size:13.5px;color:#333;line-height:1.75;display:flex;gap:8px;}
.req-item::before{content:'•';color:#C8253A;font-weight:700;flex-shrink:0;}

/* ── morichコメント ── */
.comment-block{border:1px solid #e8c0c6;padding:20px 22px;position:relative;}
.comment-block .sec-label{margin-bottom:10px;}
.comment-text{font-size:13.5px;line-height:1.9;color:#444;white-space:pre-wrap;}

/* ── ローディング ── */
.loading{text-align:center;padding:80px 24px;color:#aaa;font-size:13px;}
.spinner{width:28px;height:28px;border:2px solid #e8c0c6;border-top-color:#C8253A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── フッター ── */
.footer{text-align:center;padding:28px;font-size:11px;color:#bbb;}
.footer-logo{font-size:13px;font-weight:700;color:#C8253A;letter-spacing:3px;margin-bottom:4px;}
</style>
</head>
<body>

<div class="header">
  <a class="logo" href="index.html">
    <div class="logo-mark">m</div>
    <div class="logo-name">morich</div>
  </a>
  <a class="back-link" href="index.html">
    ← 求人一覧
  </a>
</div>

<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    読み込んでいます...
  </div>
</div>

<div class="footer">
  <div class="footer-logo">morich</div>
  © 2025 morich Inc.
</div>

<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toLines(s){
  return (s||'').split('\n').map(l=>l.trim()).filter(Boolean);
}

function render(j){
  document.title = `${j.position}｜${j.company}｜morich`;

  // メタタグ
  const metas = [
    j.employment  ? `<span class="meta-tag">${esc(j.employment)}</span>` : '',
    j.location    ? `<span class="meta-tag">${esc(j.location)}</span>` : '',
    j.salary      ? `<span class="meta-tag red">${esc(j.salary)}</span>` : '',
    j.remote && j.remote.includes('フルリモート') ? `<span class="meta-tag red">🏠 フルリモート</span>` : '',
    j.remote && j.remote.includes('ハイブリッド')  ? `<span class="meta-tag">🔀 ハイブリッド</span>` : '',
    j.sideJob && j.sideJob.includes('可') ? `<span class="meta-tag">副業可</span>` : '',
    j.stock && j.stock !== '非上場' ? `<span class="meta-tag">${esc(j.stock)}</span>` : '',
  ].filter(Boolean).join('');

  // 企業紹介
  const companySection = j.companyDesc ? `
    <div class="sec-label">🏢 企業紹介</div>
    <div class="sec-body">${esc(j.companyDesc)}</div>
    <hr>` : '';

  // morichオススメPOINT
  const recLines = toLines(j.recommend);
  const recommendSection = recLines.length ? `
    <div class="recommend-block">
      <div class="sec-label">🔥 morichオススメPOINT</div>
      <div class="recommend-lines">
        ${recLines.map(l=>`<div class="recommend-line">${esc(l)}</div>`).join('')}
      </div>
    </div>
    <hr>` : '';

  // 募集要項
  const rows = [
    ['ポジション', j.position],
    ['雇用形態',   j.employment],
    ['勤務地',     j.location],
    ['想定年収',   j.salary],
    ['勤務時間',   j.workHours],
    ['休日休暇',   j.holiday],
    ['リモート',   j.remote ? j.remote.split('\n')[0] : ''],
    ['副業',       j.sideJob],
    ['待遇',       j.welfare ? j.welfare.split('\n')[0] : ''],
  ].filter(([,v])=>v && v.trim());

  const descSection = j.desc ? `
    <tr><th>業務内容</th><td>${esc(j.desc)}</td></tr>` : '';

  const requirementsSection = `
    <hr>
    <div class="sec-label">📋 募集要項</div>
    <table class="req-table">
      ${rows.map(([k,v])=>`<tr><th>${esc(k)}</th><td>${esc(v)}</td></tr>`).join('')}
      ${descSection}
    </table>`;

  // 応募資格
  const reqLines = toLines(j.reqDetail || j.requirements);
  const reqSection = reqLines.length ? `
    <hr>
    <div class="sec-label">✅ 応募資格</div>
    <div class="req-list">
      ${reqLines.map(l=>`<div class="req-item">${esc(l)}</div>`).join('')}
    </div>` : '';

  // 求める人材像
  const personaSection = j.persona ? `
    <hr>
    <div class="sec-label">🎯 求める人材像</div>
    <div class="sec-body">${esc(j.persona)}</div>` : '';

  // morichコメント（推薦コメント or recommend）
  const comment = j.comment || (j.recommend ? '' : '');
  const commentSection = j.recommend ? `
    <hr>
    <div class="comment-block">
      <div class="sec-label">💬 morichコメント</div>
      <div class="comment-text">${esc(j.recommend)}</div>
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="container">
      <div class="job-id">JOB ID: ${esc(j.id)}</div>
      <div class="job-company">${esc(j.company)}</div>
      <div class="job-position">${esc(j.position || 'ポジション調整中')}</div>
      <div class="job-meta">${metas}</div>
      <hr>
      ${companySection}
      ${recommendSection}
      ${requirementsSection}
      ${reqSection}
      ${personaSection}
      ${commentSection}
    </div>`;
}

const id = new URLSearchParams(location.search).get('id');
if (!id) {
  document.getElementById('content').innerHTML =
    '<div class="loading"><p>求人IDが指定されていません。<a href="index.html">一覧へ戻る</a></p></div>';
} else {
  fetch('jobs.json')
    .then(r=>r.json())
    .then(jobs=>{
      const job = jobs.find(j=>j.id===id);
      job ? render(job)
          : document.getElementById('content').innerHTML =
              '<div class="loading"><p>求人が見つかりませんでした。<a href="index.html" style="color:#C8253A">一覧へ戻る</a></p></div>';
    })
    .catch(()=>{
      document.getElementById('content').innerHTML =
        '<div class="loading"><p>データの読み込みに失敗しました。</p></div>';
    });
}
</script>
</body>
</html>
